<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Global Immigration and Tours</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#0b132b">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Nova Global</h1>
            <p>Immigration & Luxury Tours</p>
        </header>
        <main>
            <section id="homeView" class="card">
                <h2>Your Journey Begins Here</h2>
                <p>Explore world-class visa assistance, permanent residency programs, and exclusive global tour packages.</p>
                <button id="exploreBtn">View Services</button>
            </section>
            
            <section id="servicesView" class="card hidden">
                <h2>Our Services</h2>
                <ul class="service-list">
                    <li>✈️ Global Visa Processing</li>
                    <li>🌍 Permanent Residency</li>
                    <li>🏝️ Luxury Holiday Tours</li>
                    <li>🎓 Study Abroad Programs</li>
                </ul>
                <button id="backBtn">Back Home</button>
            </section>
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
